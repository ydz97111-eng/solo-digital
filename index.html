<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسمك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    background: #050b18;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.logo {
    font-weight: 900;
    font-size: 22px;
}

.logo span {
    color: #00aaff;
}

.menu a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 60px;
    background: radial-gradient(circle at center, #0a2a66, #000);
}

/* صور وهمية */
.side {
    width: 25%;
    opacity: 0.8;
}

/* النص */
.content {
    text-align: center;
    width: 50%;
}

.content h1 {
    font-size: 42px;
}

.content h1 span {
    color: #00aaff;
}

.content p {
    margin-top: 15px;
    font-size: 18px;
    color: #ccc;
}

.btn {
    margin-top: 25px;
    display: inline-block;
    padding: 12px 30px;
    border: 2px solid #00aaff;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: #00aaff;
}

/* SECTIONS */
.section {
    padding: 60px 20px;
    text-align: center;
}

.section h2 {
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
}

.card {
    border: 1px dashed #00aaff;
    padding: 40px;
}
</style>

</head>

<body>

<nav>
    <div class="logo">اسم<span>ك</span></div>
    <div class="menu">
        <a href="#">الرئيسية</a>
        <a href="#">المنتجات</a>
        <a href="#">حول</a>
    </div>
</nav>

<section class="hero">

    <div class="side">📦</div>

    <div class="content">
        <h1>طور نفسك وطور شغلك في مكان واحد <br> <span>اسمك</span></h1>
        <p>متجر رقمي احترافي يقدم لك كل ما تحتاجه للنجاح</p>
        <a href="#" class="btn">اكتشف الآن</a>
    </div>

    <div class="side">📱</div>

</section>

<section class="section">
    <h2>الكورسات</h2>
    <div class="grid">
        <div class="card">كورس 1</div>
        <div class="card">كورس 2</div>
        <div class="card">كورس 3</div>
    </div>
</section>

<section class="section">
    <h2>القوالب</h2>
    <div class="grid">
        <div class="card">قالب 1</div>
        <div class="card">قالب 2</div>
        <div class="card">قالب 3</div>
    </div>
</section>

</body>
</html>
